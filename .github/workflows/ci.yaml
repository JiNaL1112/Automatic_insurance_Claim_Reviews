name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - fix/**
      - chore/**
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/app/src:${{ github.workspace }}/ml-core/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install pytest ruff pytest-cov pytest-mock

      - name: Lint
        run: ruff check ml-core/src/ app/src/

      - name: Generate data
        run: |
          cd ml-core
          python src/data/generate.py

      - name: Validate imports (ml-core)
        run: python -m compileall ml-core/src

      - name: Validate imports (app)
        run: python -m compileall app/src

      - name: Run app tests
        run: pytest app/src/tests/ -v --cov=app/src/api --cov-fail-under=70

      - name: Run ml-core tests
        run: pytest ml-core/tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BentoML image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-core
          file: ./ml-core/Dockerfile.ml
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-ml:ci-${{ github.sha }}
          cache-from: type=gha,scope=ml-core
          cache-to: type=gha,mode=max,scope=ml-core

      - name: Build and push Flask image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-app:ci-${{ github.sha }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  notify:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()

    steps:
      - name: CI passed summary
        if: needs.test.result == 'success'
        run: |
          echo "## ✅ CI Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: CI failed summary
        if: needs.test.result == 'failure'
        run: |
          echo "## ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the **test** job logs above for details." >> $GITHUB_STEP_SUMMARY