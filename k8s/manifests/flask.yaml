apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: flask
          image: jpatel6625/fraud-detection-app:latest
          ports:
            - containerPort: 5005
          env:
            - name: APP_BENTOML_URL
              value: http://bentoml:3000/predict
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: fraud-detection
spec:
  selector:
    app: flask
  ports:
    - port: 80
      targetPort: 5005

