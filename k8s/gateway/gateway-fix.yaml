
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fraud-detection-gateway
  namespace: gateway-system
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fraud-detection-route
  namespace: fraud-detection
spec:
  parentRefs:
    - name: fraud-detection-gateway
      namespace: gateway-system
  hostnames:
    - "fraud-detection.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: fraud-detection-svc
          namespace: fraud-detection
          port: 80

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fraud-detection-sa
  namespace: fraud-detection
  labels:
    app.kubernetes.io/name: fraud-detection