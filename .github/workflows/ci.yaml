name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/app/src:${{ github.workspace }}/ml-core/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install all dependencies
        run: |
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install pytest ruff pytest-cov pytest-mock

      - name: Lint
        run: ruff check ml-core/src/ app/src/

      - name: Generate data
        run: python ml-core/src/data/generate.py

      - name: Run ml-core tests
        run: pytest ml-core/tests/ -v --cov=ml-core/src --cov-fail-under=70

      - name: Run app tests
        run: pytest app/src/tests/ -v --cov=app/src/api --cov-fail-under=70

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build BentoML Docker image
        run: docker build -f ml-core/Dockerfile.ml -t fraud-detection-ml:latest ./ml-core

      - name: Build Flask Docker image
        run: docker build -f app/Dockerfile.app -t fraud-detection-app:latest ./app