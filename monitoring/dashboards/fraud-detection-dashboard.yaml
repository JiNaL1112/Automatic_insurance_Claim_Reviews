apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-detection-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"    # Grafana sidecar picks this up automatically
data:
  fraud-detection.json: |
    {
      "title": "Fraud Detection — ML Pipeline",
      "panels": [
        {
          "title": "Predictions per minute",
          "type": "graph",
          "targets": [{
            "expr": "rate(fraud_predictions_total[1m])",
            "legendFormat": "{{result}}"
          }]
        },
        {
          "title": "Anomaly rate %",
          "type": "stat",
          "targets": [{
            "expr": "rate(fraud_predictions_total{result='anomaly'}[5m]) / rate(fraud_predictions_total[5m]) * 100"
          }]
        },
        {
          "title": "Flask request latency p99",
          "type": "graph",
          "targets": [{
            "expr": "histogram_quantile(0.99, rate(flask_http_request_duration_seconds_bucket[5m]))"
          }]
        },
        {
          "title": "Flask 5xx errors",
          "type": "graph",
          "targets": [{
            "expr": "rate(flask_http_request_total{status=~'5..'}[5m])"
          }]
        }
      ]
    }