name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push BentoML image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-core
          file: ./ml-core/Dockerfile.ml
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-ml:latest

      - name: Build and push Flask image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-app:latest