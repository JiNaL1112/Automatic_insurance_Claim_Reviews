name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - staging
      push_latest:
        description: "Also push :latest tag"
        type: boolean
        required: false
        default: false

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  MLFLOW_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-mlflow
  ML_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-ml
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-app

jobs:

  # ── NEW: compute version once, share across all jobs ──────────────────────
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.ver.outputs.sha_tag }}
      semver_tag: ${{ steps.ver.outputs.semver_tag }}
      all_tags: ${{ steps.ver.outputs.all_tags }}
      is_release: ${{ steps.ver.outputs.is_release }}

    steps:
      - name: Compute tags
        id: ver
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Always create a short SHA tag — primary tag for K8s
          SHA_SHORT="${SHA::8}"
          SHA_TAG="sha-${SHA_SHORT}"

          # Semver tag only on releases (e.g. v1.2.3)
          if [[ "${EVENT_NAME}" == "release" ]]; then
            SEMVER_TAG="${REF_NAME}"   # GitHub release tag e.g. v1.2.3
            IS_RELEASE="true"
          else
            SEMVER_TAG=""
            IS_RELEASE="false"
          fi

          # Build comma-separated tag list for docker metadata
          # Format: sha-abc12345,v1.2.3  (semver only on release)
          TAGS="${SHA_TAG}"
          if [[ -n "${SEMVER_TAG}" ]]; then
            TAGS="${TAGS},${SEMVER_TAG}"
          fi

          echo "sha_tag=${SHA_TAG}"         >> "${GITHUB_OUTPUT}"
          echo "semver_tag=${SEMVER_TAG}"   >> "${GITHUB_OUTPUT}"
          echo "all_tags=${TAGS}"           >> "${GITHUB_OUTPUT}"
          echo "is_release=${IS_RELEASE}"   >> "${GITHUB_OUTPUT}"

          # Print summary so it's visible in the Actions log
          echo "### Version computed" >> "${GITHUB_STEP_SUMMARY}"
          echo "- SHA tag:    \`${SHA_TAG}\`"    >> "${GITHUB_STEP_SUMMARY}"
          echo "- Semver tag: \`${SEMVER_TAG:-none}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Is release: \`${IS_RELEASE}\`" >> "${GITHUB_STEP_SUMMARY}"

  # ── Build and push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: version                        # ← depends on version job
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mlflow
            context: .
            dockerfile: ./Dockerfile.mlflow
            image_env: MLFLOW_IMAGE

          - name: ml-core
            context: ./ml-core
            dockerfile: ./ml-core/Dockerfile.ml
            image_env: ML_IMAGE

          - name: app
            context: ./app
            dockerfile: ./app/Dockerfile.app
            image_env: APP_IMAGE

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Use tags computed by the version job
          # e.g.  jpatel6625/fraud-detection-ml:sha-abc12345
          #        jpatel6625/fraud-detection-ml:v1.2.3   (release only)
          tags: |
            ${{ env[matrix.image_env] }}:${{ needs.version.outputs.sha_tag }}
            ${{ needs.version.outputs.semver_tag != '' && format('{0}:{1}', env[matrix.image_env], needs.version.outputs.semver_tag) || '' }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.version=${{ needs.version.outputs.sha_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env[matrix.image_env] }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # ── Print what was pushed so it's easy to find in the logs ────────────
      - name: Summarise pushed tags
        shell: bash
        env:
          IMAGE: ${{ env[matrix.image_env] }}
          SHA_TAG: ${{ needs.version.outputs.sha_tag }}
          SEMVER_TAG: ${{ needs.version.outputs.semver_tag }}
        run: |
          echo "### ${{ matrix.name }} pushed" >> "${GITHUB_STEP_SUMMARY}"
          echo "- \`${IMAGE}:${SHA_TAG}\`" >> "${GITHUB_STEP_SUMMARY}"
          if [[ -n "${SEMVER_TAG}" ]]; then
            echo "- \`${IMAGE}:${SEMVER_TAG}\`" >> "${GITHUB_STEP_SUMMARY}"
          fi

  # ── Smoke test ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    needs: [version, build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull images
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.version.outputs.sha_tag }}   # ← sha tag, not latest
        run: |
          docker compose config
          docker compose pull

      - name: Start all services
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ needs.version.outputs.sha_tag }}
        run: docker compose up -d --no-build

      - name: Debug compose status
        if: always()
        run: docker compose ps

      - name: Wait for Flask /health (up to 120s)
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5005/health || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then echo "Smoke test passed."; exit 0; fi
            sleep 5
          done
          echo "Smoke test FAILED"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans

  # ── GitOps — patch values-prod.yaml ───────────────────────────────────────
  update-image-tag:
    name: GitOps — patch values-prod.yaml
    needs: [version, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          ref: main

      - name: Patch imageTag
        shell: bash
        env:
          SHA_TAG: ${{ needs.version.outputs.sha_tag }}
          SEMVER_TAG: ${{ needs.version.outputs.semver_tag }}
          IS_RELEASE: ${{ needs.version.outputs.is_release }}
        run: |
          set -euo pipefail

          # On a release use the semver tag, otherwise use the sha tag
          # This means your ArgoCD will show v1.2.3 on releases — easy to read
          if [[ "${IS_RELEASE}" == "true" && -n "${SEMVER_TAG}" ]]; then
            DEPLOY_TAG="${SEMVER_TAG}"
          else
            DEPLOY_TAG="${SHA_TAG}"
          fi

          echo "Patching imageTag to: ${DEPLOY_TAG}"
          sed -i "s/^  imageTag:.*/  imageTag: \"${DEPLOY_TAG}\"/" \
            helm/fraud-detection/values-prod.yaml

          git diff helm/fraud-detection/values-prod.yaml

      - name: Commit and push
        shell: bash
        env:
          SHA_TAG: ${{ needs.version.outputs.sha_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/fraud-detection/values-prod.yaml

          if git diff --cached --quiet; then
            echo "No change — skipping commit."
          else
            git commit -m "chore: deploy ${SHA_TAG} [skip ci]"
            git push origin main
          fi

  # ── Notify ─────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: [version, smoke-test, update-image-tag]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Write summary (success)
        if: needs.update-image-tag.result == 'success'
        run: |
          {
            echo "## ✅ CD Succeeded"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| SHA tag | \`${{ needs.version.outputs.sha_tag }}\` |"
            echo "| Semver tag | \`${{ needs.version.outputs.semver_tag || 'none' }}\` |"
            echo "| Deployed tag | see values-prod.yaml |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Issue (failure)
        if: needs.smoke-test.result != 'success' || needs.update-image-tag.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const shaTag = "${{ needs.version.outputs.sha_tag }}";
            const title = `CD failed: ${shaTag} (${context.sha.slice(0, 7)})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## ❌ CD failed`,
              `- SHA tag: \`${shaTag}\``,
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              '',
              '### Next steps',
              '- Check smoke-test logs',
              '- Check update-image-tag step',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
              labels: ['cd', 'failure']
            });