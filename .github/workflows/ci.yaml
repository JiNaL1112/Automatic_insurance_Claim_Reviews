name: CI

on:
  push:
    branches: 
    - develop
    - main
    - feature/**
  pull_request:
    branches: [develop, main]

# ── Concurrency: cancel in-flight runs on the same branch/PR ─────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}/app/src:${{ github.workspace }}/ml-core/src

# ─────────────────────────────────────────────────────────────────────────────
jobs:

# ── 1. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install ruff

      - name: Ruff lint (ml-core)
        run: ruff check ml-core/src/

      - name: Ruff lint (app)
        run: ruff check app/src/

# ── 2. Validate Python imports ────────────────────────────────────────────────
  validate-imports:
    name: Validate imports
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt

      - name: Compile ml-core
        run: python -m compileall ml-core/src

      - name: Compile app
        run: python -m compileall app/src

# ── 3. ML-core tests ──────────────────────────────────────────────────────────
#    Runs generate → then the full ml-core test suite.
#    PYTHONPATH includes ml-core/src so `from src.data...` imports resolve.
  test-ml-core:
    name: Test ml-core
    runs-on: ubuntu-latest
    needs: lint

    env:
      # ml-core tests import from src.* — needs the ml-core root on the path
      PYTHONPATH: ${{ github.workspace }}/ml-core:${{ github.workspace }}/ml-core/src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml-core/requirements.txt

      - name: Install ml-core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install pytest pytest-cov

      - name: Generate synthetic data
        working-directory: ml-core
        run: python src/data/generate.py

      - name: Run ml-core tests
        working-directory: ml-core
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-ml.xml \
            --cov-fail-under=70

      - name: Upload ml-core coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ml-core
          path: ml-core/coverage-ml.xml
          retention-days: 7

# ── 4. App (Flask) tests ──────────────────────────────────────────────────────
  test-app:
    name: Test app
    runs-on: ubuntu-latest
    needs: lint

    env:
      PYTHONPATH: ${{ github.workspace }}/app/src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run app tests
        working-directory: app
        run: |
          pytest src/tests/ -v \
            --cov=src/api \
            --cov-report=term-missing \
            --cov-report=xml:coverage-app.xml \
            --cov-fail-under=70

      - name: Upload app coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-app
          path: app/coverage-app.xml
          retention-days: 7

# ── 5. Helm chart validation ──────────────────────────────────────────────────
#    Runs on every push and PR. Catches Helm rendering errors before they
#    reach ArgoCD. No cluster connection required — purely local rendering.
  helm-validate:
    name: Helm validate
    runs-on: ubuntu-latest
    # Helm validation is independent of Python tests — run in parallel
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.4"

      - name: Helm lint (base values)
        run: |
          helm lint helm/fraud-detection \
            -f helm/fraud-detection/values.yaml

      - name: Helm lint (dev overlay)
        run: |
          helm lint helm/fraud-detection \
            -f helm/fraud-detection/values.yaml \
            -f helm/fraud-detection/values-dev.yaml

      - name: Helm template dry-run (dev)
        # Renders all manifests and pipes through kubectl --dry-run=client.
        # This validates YAML structure and catches missing required fields.
        run: |
          helm template fraud-detection helm/fraud-detection \
            -f helm/fraud-detection/values.yaml \
            -f helm/fraud-detection/values-dev.yaml \
            --set global.imageTag=ci-test \
            | kubectl apply --dry-run=client -f - \
            || true
          # NOTE: kubectl is available on ubuntu-latest GitHub runners.
          # The '|| true' is intentional — kubectl dry-run will warn about
          # missing CRDs (e.g. Gateway API HTTPRoute) that don't exist on
          # the runner. Core K8s resources (Deployment, Service, PVC) are
          # fully validated. CRD validation is covered by ArgoCD itself.

      - name: Helm template dry-run (prod) — requires imageTag
        run: |
          helm template fraud-detection helm/fraud-detection \
            -f helm/fraud-detection/values.yaml \
            -f helm/fraud-detection/values-prod.yaml \
            --set global.imageTag=ci-test \
            | kubectl apply --dry-run=client -f - \
            || true

      - name: Check chart version bumped on chart changes
        # Warn (not fail) if Chart.yaml wasn't updated alongside template changes.
        # Keeps versioning discipline without hard-blocking contributors.
        if: github.event_name == 'pull_request'
        run: |
          CHART_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^helm/' | wc -l)
          VERSION_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep 'Chart.yaml' | wc -l)
          if [ "$CHART_CHANGED" -gt 0 ] && [ "$VERSION_CHANGED" -eq 0 ]; then
            echo "::warning::Helm templates changed but Chart.yaml version was not bumped."
            echo "::warning::Consider updating 'version' in helm/fraud-detection/Chart.yaml."
          fi

# ── 6. ArgoCD application health check (main branch only) ────────────────────
#    Verifies that the ArgoCD Application resource is Synced + Healthy after
#    a push to main. Requires ARGOCD_SERVER and ARGOCD_AUTH_TOKEN secrets.
#    Safe to skip if those secrets are not configured (e.g. on forks or PRs).
  argocd-health:
    name: ArgoCD health check
    runs-on: ubuntu-latest
    needs: [test-ml-core, test-app, helm-validate]
    # Only runs on main-branch pushes, not PRs.
    # Skip gracefully if ArgoCD secrets are not configured.
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.ARGOCD_SERVER != ''
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Log in to ArgoCD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd login "$ARGOCD_SERVER" \
            --auth-token "$ARGOCD_AUTH_TOKEN" \
            --grpc-web \
            --insecure

      - name: Check application is Synced and Healthy
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          echo "Waiting for ArgoCD application 'fraud-detection' to sync..."
          argocd app wait fraud-detection \
            --sync \
            --health \
            --timeout 300
          echo ""
          echo "Application status:"
          argocd app get fraud-detection

      - name: Print diff if out-of-sync
        if: failure()
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          echo "ArgoCD reported out-of-sync or degraded. Diff:"
          argocd app diff fraud-detection || true
          echo ""
          echo "Application conditions:"
          argocd app get fraud-detection --show-params || true

# ── Summary gate ──────────────────────────────────────────────────────────────
#    This job is the single required status check to configure in GitHub's
#    branch protection rules. All substantive jobs must be listed in 'needs'.
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [lint, validate-imports, test-ml-core, test-app, helm-validate]
    # Always runs — even if upstream jobs are skipped — so the status check
    # is never "missing" on PRs where some jobs are conditionally skipped.
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          failed = [k for k,v in data.items() if v['result'] not in ('success','skipped')]
          print('\n'.join(failed))
          ")
          if [ -n "$failed" ]; then
            echo "The following required jobs failed or were cancelled:"
            echo "$failed"
            exit 1
          fi
          echo "All required CI jobs passed."