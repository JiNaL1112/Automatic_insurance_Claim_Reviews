apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: fraud-detection
spec:
  replicas: 2                        # scale the user-facing app
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: flask
          image: jpatel6625/fraud-detection-app:latest
          ports:
            - containerPort: 5005
          env:
            - name: BENTOML_URL
              value: http://bentoml:3000/predict
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: fraud-detection
spec:
  selector:
    app: flask
  ports:
    - port: 80
      targetPort: 5005
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-ingress
  namespace: fraud-detection
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: fraud-detection.yourdomain.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flask
                port:
                  number: 80