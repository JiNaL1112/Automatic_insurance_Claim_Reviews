apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fraud-detection-route
  namespace: fraud-detection
spec:
  parentRefs:
    - name: fraud-detection-gateway
      namespace: gateway-system
  hostnames:
    - "fraud-detection.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: flask
          namespace: fraud-detection
          port: 80