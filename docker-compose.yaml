name: automatic_insurance_claim_reviews

services:

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    # ADD THIS: tells docker compose which registry image to use when --no-build
    # is passed. Without this, compose invents a name from the folder and the
    # smoke test pull step and the compose up step use two different names.
    image: ${DOCKERHUB_USERNAME}/fraud-detection-mlflow:${IMAGE_TAG:-latest}
    container_name: mlflow
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)"]
      start_period: 90s
      interval: 20s
      timeout: 10s
      retries: 5

  bentoml:
    build:
      context: ./ml-core
      dockerfile: Dockerfile.ml
    # ADD THIS: same reason as mlflow above
    image: ${DOCKERHUB_USERNAME}/fraud-detection-ml:${IMAGE_TAG:-latest}
    container_name: bentoml
    ports:
      - "3000:3000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      # CI can be "cold" (no cached model) and BentoML health endpoints vary by version.
      # A simple TCP connect is the most reliable signal that the server is up.
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',3000)); s.close()"]
      start_period: 300s
      interval: 15s
      timeout: 5s
      retries: 20
    volumes:
      - ./bentoml_models:/root/bentoml/models

  flask:
    build:
      context: ./app
      dockerfile: Dockerfile.app
    # ADD THIS: same reason as above
    image: ${DOCKERHUB_USERNAME}/fraud-detection-app:${IMAGE_TAG:-latest}
    container_name: flask_app
    ports:
      - "5005:5005"
    environment:
      - APP_BENTOML_URL=http://bentoml:3000/predict
    depends_on:
      bentoml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5005/health', timeout=3)"]
      start_period: 15s
      interval: 15s
      timeout: 5s
      retries: 3