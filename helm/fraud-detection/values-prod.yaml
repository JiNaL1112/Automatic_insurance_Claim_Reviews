# ─────────────────────────────────────────────────────────────
# Production environment overrides
# Usage: helm upgrade --install fraud-detection ./fraud-detection \
#          -f values.yaml -f values-prod.yaml \
#          --set global.imageTag=sha-<commit>
# ─────────────────────────────────────────────────────────────

global:
  # In prod, always pin to a specific sha tag — never :latest
  # Set at deploy time: --set global.imageTag=sha-abc1234
  imageTag: "sha-716f717c"

flask:
  replicaCount: 2
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "2560Mi"

bentoml:
  replicaCount: 1   # stateful — model store on PVC; keep at 1 unless using shared storage
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  persistence:
    size: 5Gi

mlflow:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  persistence:
    size: 10Gi

gateway:
  hostname: "fraud-detection.local"
  parentRef:
    name: cluster-gateway
    namespace: nginx-gateway
    sectionName: http-fraud  
