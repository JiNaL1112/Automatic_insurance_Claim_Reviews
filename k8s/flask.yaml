apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: fraud-detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: flask
          image: jpatel6625/fraud-detection-app:latest
          ports:
            - containerPort: 5005
          env:
            - name: APP_BENTOML_URL
              value: http://bentoml:3000/predict
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: fraud-detection
spec:
  selector:
    app: flask
  ports:
    - port: 80
      targetPort: 5005
---
# Gateway API — replaces the Ingress resource
# Requires gateway.networking.k8s.io CRDs to be installed:
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/latest/download/standard-install.yaml
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fraud-detection-gateway
  namespace: fraud-detection
spec:
  gatewayClassName: nginx          # change to your installed GatewayClass e.g. istio, cilium, traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flask-route
  namespace: fraud-detection
spec:
  parentRefs:
    - name: fraud-detection-gateway
      namespace: fraud-detection
  hostnames:
    - "fraud-detection.yourdomain.com"   # replace with your domain, or remove for any host
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: flask
          port: 80