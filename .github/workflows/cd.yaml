name: CD

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Where to run CD (non-prod). Release events always mean prod."
        type: choice
        required: true
        default: dev
        options:
          - dev
          - staging
      push_latest:
        description: "Also push the :latest tag (avoid enabling for dev unless you really want it)."
        type: boolean
        required: false
        default: false

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  MLFLOW_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-mlflow
  ML_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-ml
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-app

jobs:

  build-and-push:
    name: Build & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mlflow
            context: .
            dockerfile: ./Dockerfile.mlflow
            image_env: MLFLOW_IMAGE

          - name: ml-core
            context: ./ml-core
            dockerfile: ./ml-core/Dockerfile.ml
            image_env: ML_IMAGE

          - name: app
            context: ./app
            dockerfile: ./app/Dockerfile.app
            image_env: APP_IMAGE

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        env:
          IMAGE: ${{ env[matrix.image_env] }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          set -euo pipefail

          TAGS=()
          TAGS+=("${IMAGE}:${REF_NAME}")
          TAGS+=("${IMAGE}:sha-${SHA}")

          if [[ "${EVENT_NAME}" == "release" || "${PUSH_LATEST}" == "true" ]]; then
            TAGS+=("${IMAGE}:latest")
          fi

          {
            echo "tags<<EOF"
            printf "%s\n" "${TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env[matrix.image_env] }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  smoke-test:
    name: Smoke test
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull images via docker compose (sha tag)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          docker compose config
          docker compose pull

      - name: Start all services
        # DOCKERHUB_USERNAME and IMAGE_TAG are read by docker-compose.yaml via
        # the image: fields we added. --no-build tells compose to use those
        # pre-pulled images instead of trying to build locally.
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: docker compose up -d --no-build

      - name: Debug compose status (always)
        if: always()
        run: |
          echo "--- docker compose ps ---"
          docker compose ps

      - name: Wait for Flask /health (up to 120s)
        run: |
          echo "Waiting for Flask /health..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5005/health || echo "000")
            echo "Attempt $i/24: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed."
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test FAILED — Flask never returned 200 after 120s."
          echo "--- docker compose logs (bentoml) ---"
          docker compose logs bentoml || true
          echo "--- docker compose logs (mlflow) ---"
          docker compose logs mlflow || true
          echo "--- docker compose logs (flask) ---"
          docker compose logs flask || true
          echo "--- docker compose logs ---"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down --volumes --remove-orphans

  notify:
    name: Notify deployment (GitHub)
    needs: smoke-test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Compute notification fields
        id: notify_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "release" ]]; then
            DEPLOY_ENV="prod"
            RELEASE_LINE="Release: ${RELEASE_URL}"
          else
            DEPLOY_ENV="${INPUT_ENV}"
            RELEASE_LINE="Release: (manual run)"
          fi

          echo "deploy_env=${DEPLOY_ENV}" >> "${GITHUB_OUTPUT}"
          echo "release_line=${RELEASE_LINE}" >> "${GITHUB_OUTPUT}"

      - name: Write summary (success)
        if: needs.smoke-test.result == 'success'
        shell: bash
        run: |
          {
            echo "## CD OK"
            echo ""
            echo "- Ref: \`${{ github.ref_name }}\`"
            echo "- Env: **${{ steps.notify_meta.outputs.deploy_env }}**"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- ${{ steps.notify_meta.outputs.release_line }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Issue (failure)
        if: needs.smoke-test.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CD failed: ${context.ref.replace('refs/', '')} (${context.sha.slice(0, 7)})`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## CD failed',
              '',
              `- Ref: \`${context.ref}\``,
              `- Env: **${{ steps.notify_meta.outputs.deploy_env }}**`,
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              `- ${{ steps.notify_meta.outputs.release_line }}`,
              '',
              '### What to do next',
              '- Open the run link above and check the **Smoke test** job logs.',
              '- Look for the `docker compose logs (bentoml)` section to identify startup failures.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['cd', 'failure']
            });