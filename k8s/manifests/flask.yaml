apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: fraud-detection
  labels:
    app: flask
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
        version: "1.0"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: dockerhub-creds
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: flask
      initContainers:
        - name: wait-for-bentoml
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for BentoML to be ready..."
              until nc -z bentoml 3000; do
                echo "BentoML not ready — retrying in 5s"
                sleep 5
              done
              echo "BentoML is ready."

      containers:
        - name: flask
          image: jpatel6625/fraud-detection-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5005
              protocol: TCP
          env:
            - name: APP_BENTOML_URL
              value: http://bentoml:3000/predict
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: fraud-detection
  labels:
    app: flask
spec:
  type: NodePort 
  selector:
    app: flask
  ports:
    - name: http
      port: 80
      targetPort: 5005
      protocol: TCP
      # nodePort: 30080      # Uncomment to pin the host port (30000–32767)