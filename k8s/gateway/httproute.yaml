apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flask-route
  namespace: fraud-detection
spec:
  parentRefs:
    - name: fraud-detection-gateway
      namespace: fraud-detection
  hostnames:
    - "fraud-detection.yourdomain.com"   # replace with your domain, or remove for any host
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: flask
          port: 80