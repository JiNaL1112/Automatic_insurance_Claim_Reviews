apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bentoml-models
  namespace: fraud-detection
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path        # ✅ Explicit — never rely on a default StorageClass
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bentoml
  namespace: fraud-detection
  labels:
    app: bentoml
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bentoml
  template:
    metadata:
      labels:
        app: bentoml
        version: "1.0"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: dockerhub-creds
      initContainers:
        - name: wait-for-mlflow
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MLflow to be ready..."
              until wget -qO- http://mlflow:5000/health > /dev/null 2>&1; do
                echo "MLflow not ready yet — retrying in 5s"
                sleep 5
              done
              echo "MLflow is ready."
        - name: init-bentoml-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /root/bentoml/models && chmod 777 /root/bentoml/models"]
          volumeMounts:
            - name: bentoml-models
              mountPath: /root/bentoml/models
      containers:
        - name: bentoml
          image: jpatel6625/fraud-detection-ml:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: bentoml-models
              mountPath: /root/bentoml/models
      volumes:
        - name: bentoml-models
          persistentVolumeClaim:
            claimName: bentoml-models
---
apiVersion: v1
kind: Service
metadata:
  name: bentoml
  namespace: fraud-detection
  labels:
    app: bentoml
spec:
  type: ClusterIP 
  selector:
    app: bentoml
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP