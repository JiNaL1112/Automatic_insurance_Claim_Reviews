apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: fraud-detection
spec:
  storageClassName: local-path        # ✅ Single declaration — duplicate removed
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: fraud-detection
  labels:
    app: mlflow
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        version: "1.0"
    spec:
      containers:
        - name: mlflow
          image: jpatel6625/fraud-detection-mlflow:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # ✅ FIX 2: startupProbe — gives MLflow up to 60s to initialise before
          #    readiness/liveness take over. Prevents premature traffic.
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 12      # 12 × 5s = 60s max startup window
            periodSeconds: 5

          # ✅ FIX 2: readinessProbe — pod only receives traffic once MLflow
          #    responds 200 on /health.
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ✅ FIX 2: livenessProbe — restarts the pod if MLflow becomes
          #    unresponsive after a successful startup.
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: mlflow-data
              mountPath: /app/mlruns

      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: fraud-detection
  labels:
    app: mlflow
spec:
  type: ClusterIP            # Internal only — use kubectl port-forward for local UI access
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP