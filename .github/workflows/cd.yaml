name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Build the exact revision that CI tested
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BentoML image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-core
          file: ./ml-core/Dockerfile.ml
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-ml:latest

      - name: Build and push Flask image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-app:latest