name: CI

on:
  push:
    branches: [develop, main, feature/*]
  pull_request:
    branches: [develop, main]

jobs:

  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.ver.outputs.sha_tag }}

    steps:
      - name: Compute SHA tag
        id: ver
        shell: bash
        env:
          SHA: ${{ github.sha }}
        run: |
          SHA_SHORT="${SHA::8}"
          SHA_TAG="sha-${SHA_SHORT}"
          echo "sha_tag=${SHA_TAG}" >> "${GITHUB_OUTPUT}"
          echo "### Version" >> "${GITHUB_STEP_SUMMARY}"
          echo "- SHA tag: \`${SHA_TAG}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Branch:  \`${{ github.ref_name }}\`" >> "${GITHUB_STEP_SUMMARY}"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install ruff

      - name: Lint ml-core
        run: ruff check ml-core/src/

      - name: Lint app
        run: ruff check app/src/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    env:
      PYTHONPATH: ${{ github.workspace }}/app/src:${{ github.workspace }}/ml-core/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install pytest pytest-cov pytest-mock ruff

      - name: Generate synthetic data
        run: |
          cd ml-core
          python src/data/generate.py

      - name: Validate imports — ml-core
        run: python -m compileall ml-core/src

      - name: Validate imports — app
        run: python -m compileall app/src

      - name: Run ml-core tests
        run: |
          pytest ml-core/tests/ -v \
            --cov=ml-core/src \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --tb=short

      - name: Run app tests
        run: |
          pytest app/src/tests/ -v \
            --cov=app/src/api \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: .coverage
          retention-days: 7

  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: [version, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mlflow
            context: .
            dockerfile: ./Dockerfile.mlflow
            image: fraud-detection-mlflow

          - name: ml-core
            context: ./ml-core
            dockerfile: ./ml-core/Dockerfile.ml
            image: fraud-detection-ml

          - name: app
            context: ./app
            dockerfile: ./app/Dockerfile.app
            image: fraud-detection-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.version.outputs.sha_tag }}-ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}

      - name: Summarise build
        shell: bash
        run: |
          echo "### ${{ matrix.name }} build" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ needs.version.outputs.sha_tag }}-ci\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Status: ✅ built (not pushed — CD handles push)" >> "${GITHUB_STEP_SUMMARY}"