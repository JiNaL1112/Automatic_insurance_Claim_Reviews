apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fraud-detection-gateway
  namespace: fraud-detection
spec:
  gatewayClassName: nginx
  infrastructure:
    parametersRef:
      group: gateway.nginx.org
      kind: NginxProxy
      name: fraud-detection-proxy-config
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same