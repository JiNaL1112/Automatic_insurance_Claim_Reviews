name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/app/src:${{ github.workspace }}/ml-core/src

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ml-core/requirements.txt
            app/requirements.txt

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-core/requirements.txt
          pip install -r app/requirements.txt
          pip install pytest ruff pytest-cov pytest-mock

      - name: Lint
        run: ruff check ml-core/src/ app/src/

      - name: Generate data
        run: |
          cd ml-core
          python src/data/generate.py

      - name: Validate imports (ml-core)
        run: python -m compileall ml-core/src

      - name: Validate imports (app)
        run: python -m compileall app/src

      - name: Run app tests
        run: pytest app/src/tests/ -v --cov=app/src/api --cov-fail-under=70

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build BentoML Docker image
        run: docker build -f ml-core/Dockerfile.ml -t fraud-detection-ml:latest ./ml-core

      - name: Build Flask Docker image
        run: docker build -f app/Dockerfile.app -t fraud-detection-app:latest ./app