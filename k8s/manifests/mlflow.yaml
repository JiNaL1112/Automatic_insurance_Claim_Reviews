apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: fraud-detection
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path        # ✅ Explicit — never rely on a default StorageClass
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: fraud-detection
  labels:
    app: mlflow
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        version: "1.0"
    spec:
      # ✅ Ensures pod is evicted gracefully before node drain
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: init-mlruns-dir
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /mlruns && chmod 777 /mlruns"]
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlruns

      containers:
        - name: mlflow
          image: jpatel6625/fraud-detection-mlflow:latest
          # ✅ Never use latest in production; pin to a digest or semver tag.
          #    Kept as-is here to match your existing workflow.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # ✅ Resource guardrails — prevents MLflow from starving other pods
          #    on your single-node kubeadm cluster
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"


          volumeMounts:
            - name: mlflow-data
              mountPath: /app/mlruns

      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: fraud-detection
  labels:
    app: mlflow
spec:
  type: ClusterIP            # ✅ Changed from NodePort — BentoML accesses MLflow
                             #    only internally; no need to expose it on the node.
                             #    Use kubectl port-forward for local UI access.
  selector:
    app: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP