apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: fraud-detection
  labels:
    app: flask
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
        version: "1.0"
    spec:
      terminationGracePeriodSeconds: 30

      imagePullSecrets:
        - name: dockerhub-creds

      # ✅ Spread the 2 Flask replicas across different nodes if available.
      #    On a single-node cluster this is a no-op but costs nothing and
      #    is the right practice for when you scale out.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: flask

      # ✅ Wait for BentoML to be reachable before Flask starts.
      #    Prevents Flask from starting and immediately failing /predict calls.
      initContainers:
        - name: wait-for-bentoml
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for BentoML to be ready..."
              until nc -z bentoml 3000; do
                echo "BentoML not ready — retrying in 5s"
                sleep 5
              done
              echo "BentoML is ready."

      containers:
        - name: flask
          image: jpatel6625/fraud-detection-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5005
              protocol: TCP

          env:
            - name: APP_BENTOML_URL
              value: http://bentoml:3000/predict

          # ✅ Flask is lightweight; keep requests low so both replicas fit
          #    comfortably on a laptop-grade node
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          startupProbe:
            httpGet:
              path: /health
              port: 5005
            failureThreshold: 6       # 6 × 5s = 30s startup window
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flask
  namespace: fraud-detection
  labels:
    app: flask
spec:
  type: NodePort             # ✅ Kept as NodePort — Flask is your user-facing
                             #    entry point on the local kubeadm cluster.
                             #    Use the Gateway/HTTPRoute for production traffic.
  selector:
    app: flask
  ports:
    - name: http
      port: 80
      targetPort: 5005
      protocol: TCP
      # nodePort: 30080      # Uncomment to pin the host port (30000–32767)