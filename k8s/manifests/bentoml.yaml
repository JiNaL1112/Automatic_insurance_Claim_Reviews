apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bentoml-models
  namespace: fraud-detection
spec:
  storageClassName: standard #local-path        # ✅ Single declaration — duplicate removed
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bentoml
  namespace: fraud-detection
  labels:
    app: bentoml
    version: "1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bentoml
  template:
    metadata:
      labels:
        app: bentoml
        version: "1.0"
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: bentoml
          image: jpatel6625/fraud-detection-ml:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000

          # ✅ FIX 2: startupProbe — BentoML can take several minutes on a cold
          #    start (data generation + training + registration). This gives it
          #    up to 5 minutes (60 × 5s) before readiness/liveness kick in.
          #    Uses the /healthz endpoint defined in service.py.
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            failureThreshold: 60      # 60 × 5s = 300s (5 min) — matches entrypoint.sh worst case
            periodSeconds: 5

          # ✅ FIX 2: readinessProbe — pod only receives traffic once BentoML
          #    reports healthy (model loaded and ready to serve).
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ✅ FIX 2: livenessProbe — restarts pod if BentoML hangs post-startup.
          #    Uses a longer period since inference can be slow under load.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          volumeMounts:
            - name: bentoml-models
              mountPath: /root/bentoml/models

      volumes:
        - name: bentoml-models
          persistentVolumeClaim:
            claimName: bentoml-models

---
apiVersion: v1
kind: Service
metadata:
  name: bentoml
  namespace: fraud-detection
  labels:
    app: bentoml
spec:
  type: ClusterIP
  selector:
    app: bentoml
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP