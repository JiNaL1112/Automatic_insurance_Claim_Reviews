global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: flask-app
    static_configs:
      - targets: ['flask:5005']

  - job_name: bentoml
    static_configs:
      - targets: ['bentoml:3000']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']