<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        h1 {
            color: #2c3e50;
        }
        .summary {
            background: white;
            border-radius: 8px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        table.data {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        table.data th {
            background-color: #2c3e50;
            color: white;
            padding: 10px 14px;
            text-align: left;
        }
        table.data td {
            padding: 8px 14px;
            border-bottom: 1px solid #eee;
        }
        table.data tr:last-child td {
            border-bottom: none;
        }
        table.data tr:hover td {
            background-color: #f0f4f8;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 15px;
        }
        .back-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h1>📊 Prediction Results</h1>
    <div class="summary">
        <p>Claims labelled <strong>-1</strong> are flagged as potential anomalies. Claims labelled <strong>1</strong> are considered normal.</p>
    </div>

    {% for table in tables %}
        {{ table | safe }}
    {% endfor %}

    <br>
    <a href="/" class="back-btn">⬅ Analyse Another File</a>
</body>
</html>
