services:

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5000:5000"
    healthcheck:
      # Use python3 (always available in the image) instead of curl
      # Sends a plain GET /health — no Host header tricks needed since
      # MLFLOW_SERVER_ALLOWED_HOSTS=* accepts everything
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)"]
      start_period: 40s
      interval: 15s
      timeout: 5s
      retries: 5

  bentoml:
    build:
      context: ./ml-core
      dockerfile: Dockerfile.ml
    container_name: bentoml
    ports:
      - "3000:3000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    command: bentoml serve src/serving/service.py --host 0.0.0.0 --port 3000
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:3000/healthz', timeout=3)"]
      start_period: 20s
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./bentoml_models:/root/bentoml/models

  flask:
    build:
      context: ./app
      dockerfile: Dockerfile.app
    container_name: flask_app
    ports:
      - "5005:5005"
    environment:
      - BENTOML_URL=http://bentoml:3000/predict
    depends_on:
      bentoml:
        condition: service_healthy
    command: python src/api/flask_app.py
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5005/health', timeout=3)"]
      start_period: 15s
      interval: 15s
      timeout: 5s
      retries: 3