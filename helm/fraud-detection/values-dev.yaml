# ─────────────────────────────────────────────────────────────
# Dev environment overrides
# Usage: helm upgrade --install fraud-detection ./fraud-detection \
#          -f values.yaml -f values-dev.yaml
# ─────────────────────────────────────────────────────────────

global:
  imageTag: latest   # dev always pulls :latest

# Scale down to save resources in dev
flask:
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

bentoml:
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

gateway:
  hostname: "fraud-detection.dev.local"
